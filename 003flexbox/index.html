<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendiendo Flexbox</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: bisque;
            font-family: Arial, Helvetica, sans-serif;
        }

        .flex-container {
            display: flex;
            flex-flow: row wrap;
            justify-content: center;
            align-items: center;
            gap: 20px;

            min-height: 40rem;

            padding: 20px;
            background-color: burlywood;
            border: 2px solid black;
        }

        .flex-container>div {
            width: 100px;
            height: 75px;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 30px;
            border: 2px solid black;
            background-color: gainsboro;

            box-shadow: 7px 13px 37px gray;

            transition: transform .3s ease;
        }

        .column {
            flex: 0 0 25%;
            max-width: 25%;
        }

        .flex-container>div:hover {
            transform: scale(1.2);
            cursor: pointer;
        }
    </style>

</head>

<body>
    <div class="flex-container">
        <div style="order:6; background:red;">1</div>
        <div style="background:blue;">2</div>
        <div style="align-self: flex-start; order:1; background:green;">3</div>
        <div style="align-self: flex-end; order:4; background:yellow;">4</div>
        <div class="column">5</div>
        <div class="column">6</div>
        <div class="column">7</div>
        <div class="column">8</div>
    </div>
</body>

</html>
