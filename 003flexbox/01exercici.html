<!DOCTYPE html>
<html>
<head>
<style>
.container {
  background-color: #f1f1f1;
  padding: 10px;
  height: 200px;
  display: flex;
  flex-direction:row-reverse;
  gap:10px;
  flex-wrap: wrap-reverse;
  /*flex-flow: row wrap;*/
  justify-content: space-between;
  align-items: flex-start;
}

.container > div {
  background-color: #04AA6D;
  color: white;
  padding: 20px;
  text-align: center;
}
</style>
</head>
<body>

<div class="container">
  <div>1</div>
  <div>2</div>
  <div>3</div>
  <div>4</div>
  <div>5</div>
  <div>6</div>
  <div>7</div>
</div>

</body>
</html>
